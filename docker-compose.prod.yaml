services:
  postgres:
    image: postgres:18.3 # Use The Official PostgreSQL Image From Docker Hub
    restart: always # Always Restart The Container If It Stops
    environment:
      POSTGRES_DB: ToDoAppDb # Set The Default Database Name
      POSTGRES_USER: Admin # Set The Default Database User
      POSTGRES_PASSWORD: Admin # Set The Default Database Password
    volumes:
      - pgdata:/var/lib/postgresql # Persist Data In A Docker Volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Admin -d ToDoAppDb"] # Check If PostgreSQL Is Ready To Accept Connections
      interval: 10s # Check Every 10 Seconds
      retries: 5 # Retry Up To 5 Times Before Marking As Unhealthy
      timeout: 5s # Timeout After 5 Seconds

  seq:
    image: datalust/seq:2025.2
    container_name: seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "Admin" # Set The Admin Password For Seq
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/health || exit 1"] # Check If Seq Is Healthy By Hitting The /api/health Endpoint
      interval: 10s # Check Every 10 Seconds
      retries: 5 # Retry Up To 5 Times Before Marking As Unhealthy
      timeout: 3s # Timeout After 3 Seconds

  api:
    image: argul0/ToDoApp:ToDoApp-web-api-2.1.0 # Use The Published Docker Image From Docker Hub For Current Version
    restart: always # Always Restart The Container If It Stops
    environment:
      ASPNETCORE_ENVIRONMENT: Production # Set The ASP.NET Core Environment To Production
      ASPNETCORE_URLS: "http://+:80" # Configure The API To Listen On Port 80
      ConnectionStrings__DefaultConnection: Host=postgres;Database=ToDoAppDb;Username=Admin;Password=Admin # Database Connection String
    depends_on:
      postgres:
          condition: service_healthy
      seq:
          condition: service_healthy # Ensure The API Starts Only After Seq Is Healthy

    ports:
      - "5000:80" # Map API Port To The Host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"] # Check If The API Is Healthy By Hitting The /health Endpoint
      interval: 10s # Check Every 10 Seconds
      retries: 5 # Retry Up To 5 Times Before Marking As Unhealthy
      timeout: 3s # Timeout After 3 Seconds



volumes:
  pgdata: # Define A Named Volume For PostgreSQL Data Persistence
  seq_data: # Define A Named Volume For Seq Data Persistence